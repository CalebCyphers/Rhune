# fly.toml for Rhune Discord Bot
app = "rhune-bot"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  concurrency = { type = "connections", soft_limit = 250, hard_limit = 500 }

[env]
  NODE_ENV = "production"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
